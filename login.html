<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chuks Kitchen - Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <!-- Same as index.html -->
      <div class="logo">Chuks Kitchen</div>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="menu.html">Explore</a></li>
          <li><a href="#">My Orders</a></li>
          <li><a href="#">Account</a></li>
        </ul>
      </nav>
      <button class="login-btn">Login</button>
    </header>

    <main class="form-container">
      <div class="form-left">
        <h1>Chuks Kitchen</h1>
        <p>
          Your journey to delicious, authentic Nigerian meals starts here. Sign
          up or log in to order your favorites today!
        </p>
        <img src="images/food-table.jpg" alt="Nigerian meals" />
      </div>
      <div class="form-right">
        <h2>Login Your Account</h2>
        <form>
          <input type="text" placeholder="Email or Phone name@gmail.com" />
          <input type="password" placeholder="Password" />
          <a href="#">Forgot Password?</a>
          <button class="continue-btn">Continue</button>
        </form>
        <p>Or continue with</p>
        <button>Continue with Google</button>
        <button>Continue with Apple</button>
        <button>Continue with Facebook</button>
        <p>
          Don't have an account? <a href="signup.html">Create an account</a>
        </p>
      </div>
    </main>

    <footer>
      <!-- Same as index.html -->
    </footer>
  </body>
</html>

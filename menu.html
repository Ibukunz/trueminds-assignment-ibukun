<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chuks Kitchen - Menu</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <!-- Same -->
    </header>

    <main>
      <div class="menu-header">
        <h1>Chuks Kitchen</h1>
        <p>Chuks Kitchen Nigerian Home Cooking 4.8 (12k)</p>
        <img src="images/menu-hero.jpg" alt="Assorted Nigerian dishes" />
      </div>
      <div class="category-select">
        <label>Menu Categories</label>
        <select>
          <option>Popular</option>
          <option>Jollof Rice & Entrees</option>
          <option>Swallow & Soups</option>
          <option>Grills & Sides</option>
        </select>
      </div>
      <section class="menu-grid">
        <h2>Popular</h2>
        <div class="menu-item">
          <img
            src="images/jollof-fried-chicken.jpg"
            alt="Jollof Rice & Fried Chicken"
          />
          <h3>Jollof Rice & Fried Chicken</h3>
          <p>Our signature jollof, served with crispy fried chicken.</p>
          <p>N2,800</p>
        </div>

        <div class="menu-item">
          <img src="images/eba-egusi.jpg" alt="Eba & Egusi" />
          <h3>Eba & Egusi (Goat Meat)</h3>
          <p>Hearty Egusi soup with tender goat meat.</p>
          <p>N1,500</p>
        </div>
      </section>
      <section class="menu-grid">
        <h2>Jollof Rice & Entrees</h2>
        <!-- Similar items -->
      </section>
      <section class="menu-grid">
        <h2>Swallow & Soups</h2>
        <!-- Similar -->
      </section>
    </main>

    <footer>
      <!-- Same -->
    </footer>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chuks Kitchen - Payment</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <!-- Same -->
    </header>

    <main class="payment">
      <h1>Payment</h1>
      <h3>Pay With:</h3>
      <div class="payment-methods">
        <label><input type="radio" name="method" checked /> Card</label>
        <label><input type="radio" name="method" /> Bank</label>
        <label><input type="radio" name="method" /> Transfer</label>
      </div>
      <input type="text" placeholder="Card Number 1234 5678 9101 1121" />
      <div style="display: flex; gap: 10px">
        <input type="text" placeholder="Expiration Date MM/YY" />
        <input type="text" placeholder="CVV 123" />
      </div>
      <label><input type="checkbox" /> Save card details</label>
      <button class="pay-btn">Pay N9,900</button>
      <p>
        Your personal data will be used to process your order, support your
        experience throughout this website, and for other purposes described in
        our privacy policy.
      </p>
    </main>

    <footer>
      <!-- Same -->
    </footer>
  </body>
</html>

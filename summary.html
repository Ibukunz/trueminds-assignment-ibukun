<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chuks Kitchen - Order Summary</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <!-- Same -->
    </header>

    <main class="summary">
      <h1>Order Summary</h1>
      <div>
        <label>Add a Promo Code</label>
        <input type="text" placeholder="Enter Code here" />
        <button>Apply</button>
      </div>
      <p>Subtotal N2,200</p>
      <p>Delivery Fee N500</p>
      <p>Service Fee N200</p>
      <p>Tax Fee N0</p>
      <p class="total">Total N2,900</p>
      <div class="delivery-pickup">
        <button class="active">Delivery</button>
        <button>Pick up</button>
      </div>
      <label>Special Instructions for Restaurant</label>
      <textarea
        class="special-instructions"
        placeholder="E.g no onion, food is too spicy, food too hot hhhhhhhhh food is tasty"
      ></textarea>
      <button class="continue-btn">Proceed to Checkout</button>
    </main>

    <footer>
      <!-- Same -->
    </footer>
  </body>
</html>
